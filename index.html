<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proto M2 | Hyper-Realistic 3D Visualization</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader">
        <div class="loader-brand">Proto · M2</div>
        <div class="bar-wrap"><div class="bar" id="progress-bar"></div></div>
        <div class="loader-txt" id="loading-text">Initialising</div>
    </div>

    <div id="canvas-container">
        <canvas id="canvas3d"></canvas>

        <!-- New Translucent UI Overlay Structure -->
        <div id="topbar">
            <div class="brand">Proto · M2</div>
            <div class="status-pill">
                <div class="dot"></div>
                <div class="status-text" id="status-text">Ready</div>
            </div>
        </div>

        <div id="anim-label">
            <div id="anim-name">Idle</div>
            <div id="anim-tag">tap a button or speak a command</div>
        </div>

        <div id="transcript-wrap"><span id="transcript-text" class="voice-status"></span></div>

        <button id="voice-orb" class="voice-btn">
            <svg class="mic-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="2" width="6" height="12" rx="3"/>
                <path d="M5 10a7 7 0 0 0 14 0"/>
                <line x1="12" y1="17" x2="12" y2="21"/>
                <line x1="9"  y1="21" x2="15" y2="21"/>
            </svg>
        </button>

        <div class="voice-hint">Say: idle · walk · run · crouch</div>

        <div id="bottom-panel">
            <div class="panel-label">Animations</div>
            <div id="btn-grid">
                <button class="anim-btn action-btn active" data-action="Idle">
                    <span class="btn-icon">🧘</span>
                    <span class="btn-label">Idle</span>
                    <span class="btn-sub">standby</span>
                </button>
                <button class="anim-btn action-btn" data-action="Walking">
                    <span class="btn-icon">🚶</span>
                    <span class="btn-label">Walk</span>
                    <span class="btn-sub">stroll</span>
                </button>
                <button class="anim-btn action-btn" data-action="Running">
                    <span class="btn-icon">🏃</span>
                    <span class="btn-label">Run</span>
                    <span class="btn-sub">sprint</span>
                </button>
                <button class="anim-btn action-btn" data-action="Crouch">
                    <span class="btn-icon">🤲</span>
                    <span class="btn-label">Crouch</span>
                    <span class="btn-sub">pick up</span>
                </button>
                <button class="anim-btn disabled"><span class="btn-icon">＋</span><span class="btn-label">Soon</span><span class="btn-sub">coming</span></button>
                <button class="anim-btn disabled"><span class="btn-icon">＋</span><span class="btn-label">Soon</span><span class="btn-sub">coming</span></button>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
          }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
